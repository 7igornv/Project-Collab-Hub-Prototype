<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Создание проекта - Project Collab Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .create-project-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }
        
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin: 15px 0;
            padding: 15px;
            background: var(--light);
            border-radius: var(--border-radius);
        }
        
        .skill-checkbox {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .error-message {
            color: var(--danger);
            font-size: 12px;
            margin-top: 5px;
        }
        
        .form-control.error {
            border-color: var(--danger);
        }

        .auth-warning {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .auth-warning .btn {
            margin: 10px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">ProjectCollab</a>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="profile.html" id="profile-link">Профиль</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div id="create-project-container" class="create-project-container">
                <!-- Сюда будет вставлен контент в зависимости от авторизации -->
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Project Collab Hub. Учебный проект.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script>
        // Проверка авторизации
        function checkAuth() {
            const token = localStorage.getItem('token');
            const container = document.getElementById('create-project-container');
            
            if(!token) {
                container.innerHTML = `
                    <div class="auth-warning">
                        <h2>Требуется авторизация</h2>
                        <p>Чтобы создать проект, пожалуйста, войдите или зарегистрируйтесь</p>
                        <a href="login.html" class="btn btn-primary">Войти</a>
                        <a href="login.html" class="btn btn-outline">Регистрация</a>
                    </div>
                `;
                return false;
            }
            return true;
        }

        // Загрузка формы создания проекта
        async function loadCreateProjectForm() {
            if(!checkAuth()) return;

            const container = document.getElementById('create-project-container');
            
            container.innerHTML = `
                <h1>Создание нового проекта</h1>
                
                <form id="create-project-form">
                    <div class="form-group">
                        <label>Название проекта *</label>
                        <input type="text" id="project-title" class="form-control" placeholder="Например: Разработка интернет-магазина" required>
                        <div id="title-error" class="error-message"></div>
                    </div>

                    <div class="form-group">
                        <label>Описание проекта *</label>
                        <textarea id="project-description" class="form-control" rows="6" placeholder="Подробно опишите, что нужно сделать..." required></textarea>
                        <div id="description-error" class="error-message"></div>
                    </div>

                    <div class="form-group">
                        <label>Бюджет (₽)</label>
                        <input type="number" id="project-budget" class="form-control" placeholder="50000">
                        <div id="budget-error" class="error-message"></div>
                    </div>

                    <div class="form-group">
                        <label>Дедлайн</label>
                        <input type="date" id="project-deadline" class="form-control">
                    </div>

                    <div class="form-group">
                        <label>Требуемые навыки</label>
                        <div class="skills-grid" id="skills-grid">
                            <!-- Навыки подгрузятся через JS -->
                        </div>
                    </div>

                    <div class="form-group">
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Опубликовать проект</button>
                    </div>
                </form>
            `;

            // Загружаем список навыков
            const skills = [
                {id: 1, name: 'PHP'}, {id: 2, name: 'JavaScript'}, {id: 3, name: 'Python'},
                {id: 4, name: 'UI/UX'}, {id: 5, name: 'HTML/CSS'}, {id: 6, name: 'MySQL'},
                {id: 7, name: 'React'}, {id: 8, name: 'Vue.js'}, {id: 9, name: 'Laravel'},
                {id: 10, name: 'WordPress'}
            ];
            
            const skillsGrid = document.getElementById('skills-grid');
            skillsGrid.innerHTML = skills.map(skill => `
                <label class="skill-checkbox">
                    <input type="checkbox" name="skills" value="${skill.id}"> ${skill.name}
                </label>
            `).join('');

            setupValidation();
        }

        // Валидация формы
        function setupValidation() {
            const titleInput = document.getElementById('project-title');
            const descInput = document.getElementById('project-description');
            const budgetInput = document.getElementById('project-budget');

            titleInput.addEventListener('input', function() {
                const error = document.getElementById('title-error');
                if (this.value.length < 5) {
                    error.textContent = 'Название должно быть не менее 5 символов';
                    this.classList.add('error');
                } else {
                    error.textContent = '';
                    this.classList.remove('error');
                }
            });

            descInput.addEventListener('input', function() {
                const error = document.getElementById('description-error');
                if (this.value.length < 20) {
                    error.textContent = 'Описание должно быть не менее 20 символов';
                    this.classList.add('error');
                } else {
                    error.textContent = '';
                    this.classList.remove('error');
                }
            });

            budgetInput.addEventListener('input', function() {
                const error = document.getElementById('budget-error');
                if (this.value && this.value < 1000) {
                    error.textContent = 'Бюджет не может быть менее 1000 ₽';
                    this.classList.add('error');
                } else {
                    error.textContent = '';
                    this.classList.remove('error');
                }
            });

            // Отправка формы
            document.getElementById('create-project-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const selectedSkills = Array.from(document.querySelectorAll('input[name="skills"]:checked'))
                    .map(cb => parseInt(cb.value));
                
                const projectData = {
                    title: document.getElementById('project-title').value,
                    description: document.getElementById('project-description').value,
                    budget: parseFloat(document.getElementById('project-budget').value) || null,
                    deadline: document.getElementById('project-deadline').value || null,
                    skills: selectedSkills
                };
                
                const result = await api.createProject(projectData);
                
                if(result.status === 'success') {
                    alert('Проект успешно создан!');
                    window.location.href = 'index.html';
                } else {
                    alert('Ошибка: ' + (result.message || 'Неизвестная ошибка'));
                }
            });
        }

        // Инициализация
        loadCreateProjectForm();
    </script>
</body>
</html>
