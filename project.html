<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Проект - Project Collab Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .project-detail {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .project-meta {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
            padding: 20px;
            background: var(--light);
            border-radius: var(--border-radius);
        }

        .project-meta-item {
            text-align: center;
        }

        .project-meta-item .label {
            font-size: 14px;
            color: var(--secondary);
            margin-bottom: 5px;
        }

        .project-meta-item .value {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary);
        }

        .bids-section {
            margin-top: 40px;
            padding: 20px;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        .bids-section h3 {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
        }

        .bid-card {
            border: 1px solid #eee;
            border-radius: var(--border-radius);
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .bid-card:hover {
            box-shadow: var(--shadow);
        }

        .bid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .bid-developer {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
        }

        .bid-status {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-accepted {
            background: #d4edda;
            color: #155724;
        }

        .status-rejected {
            background: #f8d7da;
            color: #721c24;
        }

        .bid-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--secondary);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--secondary);
        }

        .back-button {
            margin-bottom: 20px;
        }

        .skill-tag {
            display: inline-block;
            padding: 5px 10px;
            background: var(--light);
            border-radius: 20px;
            font-size: 12px;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        .status-cancelled {
            background: #e2e3e5;
            color: #383d41;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">ProjectCollab</a>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="#" id="profile-link" style="display: none;">Профиль</a>
                <a href="login.html" id="login-link" class="btn btn-outline">Вход</a>
                <a href="login.html?tab=register" id="register-link" class="btn btn-primary">Регистрация</a>
                <a href="#" id="logout-link" style="display: none;" class="btn btn-outline">Выход</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="back-button">
                <button class="btn btn-outline" onclick="history.back()">← Назад</button>
            </div>
            
            <div id="project-detail" class="project-detail">
                <div class="loading">Загрузка проекта...</div>
            </div>
            
            <!-- Отдельный контейнер для откликов -->
            <div id="bids-container" class="bids-section" style="display: none;">
                <h3>Отклики на проект</h3>
                <div id="bids-list"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Project Collab Hub. Учебный проект.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');
        let currentUser = null;
        let currentProject = null;

        // Проверка авторизации
        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            currentUser = user;
            
            const profileLink = document.getElementById('profile-link');
            const loginLink = document.getElementById('login-link');
            const registerLink = document.getElementById('register-link');
            const logoutLink = document.getElementById('logout-link');
            
            if(token) {
                profileLink.style.display = 'inline';
                loginLink.style.display = 'none';
                registerLink.style.display = 'none';
                logoutLink.style.display = 'inline';
                
                profileLink.innerHTML = user.full_name || 'Профиль';
                profileLink.href = 'profile.html';
            } else {
                profileLink.style.display = 'none';
                loginLink.style.display = 'inline';
                registerLink.style.display = 'inline';
                logoutLink.style.display = 'none';
            }
        }

        // Выход
        document.getElementById('logout-link').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        });

        // Загрузка проекта
        async function loadProject() {
            const container = document.getElementById('project-detail');
            
            if(!projectId) {
                container.innerHTML = '<div class="error">ID проекта не указан</div>';
                return;
            }
            
            try {
                const projectResult = await api.getProject(projectId);
                
                if(projectResult.status === 'success' && projectResult.data) {
                    currentProject = projectResult.data;
                    
                    // Показываем проект
                    container.innerHTML = `
                        <div class="project-header">
                            <h1>${currentProject.title}</h1>
                        </div>

                        <div class="project-meta">
                            <div class="project-meta-item">
                                <div class="label">Бюджет</div>
                                <div class="value">${currentProject.budget ? currentProject.budget + ' ₽' : 'Не указан'}</div>
                            </div>
                            <div class="project-meta-item">
                                <div class="label">Заказчик</div>
                                <div class="value">${currentProject.client_name}</div>
                            </div>
                            <div class="project-meta-item">
                                <div class="label">Дата</div>
                                <div class="value">${new Date(currentProject.created_at).toLocaleDateString()}</div>
                            </div>
                        </div>

                        <div class="project-description">
                            <h3>Описание</h3>
                            <p>${currentProject.description.replace(/\n/g, '<br>')}</p>
                        </div>

                        ${currentProject.skills ? `
                            <div class="project-skills">
                                <h3>Навыки</h3>
                                ${currentProject.skills.split(',').map(skill => 
                                    `<span class="skill-tag">${skill}</span>`
                                ).join('')}
                            </div>
                        ` : ''}
                    `;
                    
                    // Если пользователь - владелец проекта, загружаем отклики
                    if(currentUser && currentProject.client_id == currentUser.id) {
                        loadBids();
                    }
                    
                } else {
                    container.innerHTML = '<div class="error">Проект не найден</div>';
                }
            } catch(error) {
                console.error('Error loading project:', error);
                container.innerHTML = '<div class="error">Ошибка загрузки проекта</div>';
            }
        }

        // Загрузка откликов на проект
        async function loadBids() {
            const bidsContainer = document.getElementById('bids-container');
            const bidsList = document.getElementById('bids-list');
            
            bidsContainer.style.display = 'block';
            bidsList.innerHTML = '<div class="loading">Загрузка откликов...</div>';
            
            try {
                const bidsResult = await api.getProjectBids(projectId);
                console.log('Отклики с сервера:', bidsResult);
                
                if(bidsResult.status === 'success' && bidsResult.data) {
                    let bids = bidsResult.data;
                    
                    if(bids.length > 0) {
                        let html = bids.map(bid => {
                            let statusClass = 'status-pending';
                            let statusText = 'Ожидает';
                            let showActions = true;
                            
                            // Если проект удален
                            if(bid.project_deleted == 1) {
                                statusClass = 'status-cancelled';
                                statusText = 'Проект отменен';
                                showActions = false;
                            }
                            // Если отклик принят
                            else if(bid.status_name === 'accepted' || bid.status_id == 2) {
                                statusClass = 'status-accepted';
                                statusText = 'Принят';
                                showActions = false;
                            }
                            // Если отклик отклонен
                            else if(bid.status_name === 'rejected' || bid.status_id == 3) {
                                statusClass = 'status-rejected';
                                statusText = 'Отклонен';
                                showActions = false;
                            }
                            
                            return `
                                <div class="bid-card" id="bid-${bid.id}">
                                    <div class="bid-header">
                                        <span class="bid-developer">${bid.developer_name || 'Исполнитель'}</span>
                                        <span class="bid-status ${statusClass}">${statusText}</span>
                                    </div>
                                    <p><strong>Предложение:</strong> ${bid.proposed_budget ? bid.proposed_budget + ' ₽' : 'Не указано'}</p>
                                    ${bid.cover_letter ? `<p><strong>Письмо:</strong> ${bid.cover_letter}</p>` : ''}
                                    <p><small>Отправлено: ${new Date(bid.created_at).toLocaleDateString()}</small></p>
                                    ${showActions && bid.status_name === 'pending' ? `
                                        <div class="bid-actions">
                                            <button class="btn btn-small btn-success" onclick="acceptBid(${bid.id})">✓ Принять</button>
                                            <button class="btn btn-small btn-danger" onclick="rejectBid(${bid.id})">✗ Отклонить</button>
                                        </div>
                                    ` : ''}
                                </div>
                            `;
                        }).join('');
                        
                        bidsList.innerHTML = html;
                    } else {
                        bidsList.innerHTML = '<div class="empty-state">Пока нет откликов</div>';
                    }
                } else {
                    bidsList.innerHTML = '<div class="empty-state">Ошибка загрузки откликов</div>';
                }
            } catch(error) {
                console.error('Error loading bids:', error);
                bidsList.innerHTML = '<div class="empty-state" style="color: var(--danger);">Ошибка загрузки откликов</div>';
            }
        }

        // Принять отклик
        window.acceptBid = async (bidId) => {
            if(confirm('Принять этот отклик?')) {
                const result = await api.acceptBid(bidId);
                if(result.status === 'success') {
                    alert('Отклик принят!');
                    // Перезагружаем отклики, но не всю страницу
                    loadBids();
                } else {
                    alert('Ошибка: ' + (result.message || 'Не удалось принять отклик'));
                }
            }
        };

        // Отклонить отклик
        window.rejectBid = async (bidId) => {
            if(confirm('Отклонить этот отклик?')) {
                const result = await api.rejectBid(bidId);
                if(result.status === 'success') {
                    alert('Отклик отклонен');
                    // Перезагружаем отклики
                    loadBids();
                } else {
                    alert('Ошибка: ' + (result.message || 'Не удалось отклонить отклик'));
                }
            }
        };

        // Инициализация
        checkAuth();
        loadProject();
    </script>
</body>
</html>
