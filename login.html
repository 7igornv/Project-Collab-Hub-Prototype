<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация - Project Collab Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }
        
        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        
        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 16px;
            color: #666;
        }
        
        .auth-tab.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            font-weight: bold;
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .error-message {
            color: var(--danger);
            font-size: 12px;
            margin-top: 5px;
            min-height: 20px;
        }
        
        .form-control.error {
            border-color: var(--danger);
        }
        
        .role-selector {
            display: flex;
            gap: 20px;
            margin: 15px 0;
        }
        
        .role-option {
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">ProjectCollab</a>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="projects.html">Проекты</a>
                <a href="login.html" class="btn btn-primary">Вход</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="auth-container">
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">Вход</button>
                    <button class="auth-tab" onclick="switchTab('register')">Регистрация</button>
                </div>

                <!-- Форма входа -->
                <form id="login-form" class="auth-form active">
                    <h2>Вход в аккаунт</h2>
                    
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" class="form-control" placeholder="example@mail.com">
                        <div id="login-email-error" class="error-message"></div>
                    </div>

                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="login-password" class="form-control" placeholder="••••••">
                        <div id="login-password-error" class="error-message"></div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">Войти</button>
                </form>

                <!-- Форма регистрации -->
                <form id="register-form" class="auth-form">
                    <h2>Создать аккаунт</h2>

                    <div class="form-group">
                        <label>Полное имя</label>
                        <input type="text" id="register-name" class="form-control" placeholder="Иван Петров">
                        <div id="register-name-error" class="error-message"></div>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="register-email" class="form-control" placeholder="example@mail.com">
                        <div id="register-email-error" class="error-message"></div>
                    </div>

                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="register-password" class="form-control" placeholder="••••••">
                        <div id="register-password-error" class="error-message"></div>
                    </div>

                    <div class="form-group">
                        <label>Подтверждение пароля</label>
                        <input type="password" id="register-confirm" class="form-control" placeholder="••••••">
                        <div id="register-confirm-error" class="error-message"></div>
                    </div>

                    <div class="form-group">
                        <label>Выберите роль</label>
                        <div class="role-selector">
                            <label class="role-option">
                                <input type="radio" name="role" value="client" checked> Заказчик
                            </label>
                            <label class="role-option">
                                <input type="radio" name="role" value="developer"> Исполнитель
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">Зарегистрироваться</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Project Collab Hub. Учебный проект.</p>
        </div>
    </footer>

    <script>
        // Переключение между вкладками
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }

        // Валидация форм
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Вход выполнен (демо-режим)');
        });

        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Регистрация выполнена (демо-режим)');
        });

        // Валидация в реальном времени
        document.getElementById('register-email').addEventListener('input', function() {
            const error = document.getElementById('register-email-error');
            if (!this.value.includes('@')) {
                error.textContent = 'Введите корректный email';
                this.classList.add('error');
            } else {
                error.textContent = '';
                this.classList.remove('error');
            }
        });

        document.getElementById('register-password').addEventListener('input', function() {
            const error = document.getElementById('register-password-error');
            if (this.value.length < 6) {
                error.textContent = 'Пароль должен быть не менее 6 символов';
                this.classList.add('error');
            } else {
                error.textContent = '';
                this.classList.remove('error');
            }
        });

        document.getElementById('register-confirm').addEventListener('input', function() {
            const password = document.getElementById('register-password').value;
            const error = document.getElementById('register-confirm-error');
            if (this.value !== password) {
                error.textContent = 'Пароли не совпадают';
                this.classList.add('error');
            } else {
                error.textContent = '';
                this.classList.remove('error');
            }
        });
    </script>
</body>
</html>
