<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Личный кабинет - Project Collab Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
            margin: 40px 0;
        }
        
        .profile-sidebar {
            background: white;
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow);
        }
        
        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--light);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: var(--secondary);
        }
        
        .profile-menu {
            list-style: none;
            margin-top: 20px;
        }
        
        .profile-menu li {
            margin-bottom: 10px;
        }
        
        .profile-menu a {
            display: block;
            padding: 10px;
            text-decoration: none;
            color: var(--dark);
            border-radius: var(--border-radius);
            transition: background 0.3s;
            cursor: pointer;
        }
        
        .profile-menu a:hover,
        .profile-menu a.active {
            background: var(--light);
            color: var(--primary);
        }
        
        .profile-content {
            background: white;
            border-radius: var(--border-radius);
            padding: 30px;
            box-shadow: var(--shadow);
        }
        
        .profile-section {
            display: none;
        }
        
        .profile-section.active {
            display: block;
        }
        
        .projects-list, .bids-list {
            display: grid;
            gap: 15px;
            margin-top: 20px;
        }
        
        .project-card, .bid-card {
            border: 1px solid #eee;
            border-radius: var(--border-radius);
            padding: 15px;
        }
        
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .project-status {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-open { background: #e8f5e9; color: #2e7d32; }
        .status-progress { background: #fff3e0; color: #ef6c00; }
        .status-done { background: #e3f2fd; color: #1565c0; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        
        .stat-card {
            text-align: center;
            padding: 20px;
            background: var(--light);
            border-radius: var(--border-radius);
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary);
        }
        
        .stat-label {
            color: var(--secondary);
            margin-top: 5px;
        }

        .logout-btn {
            margin-top: 20px;
            width: 100%;
        }

        .bid-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-small {
            padding: 5px 10px;
            font-size: 12px;
        }

        .filter-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-select {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
        }

        .btn-info {
            background: #17a2b8;
            color: white;
        }

        .btn-info:hover {
            background: #138496;
        }

        .status-cancelled {
            background: #e2e3e5;
            color: #383d41;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">ProjectCollab</a>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="profile.html" id="profile-link" class="btn btn-primary">Профиль</a>
                <a href="#" id="logout-link" class="btn btn-outline">Выйти</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div id="profile-container">
                <!-- Контент загружается через JS -->
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Project Collab Hub. Учебный проект.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script>
        // Проверка авторизации
        function checkAuth() {
            const token = localStorage.getItem('token');
            if(!token) {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }

        // Выход
        document.getElementById('logout-link').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        });

        // Основная загрузка профиля
        async function loadProfile() {
            if(!checkAuth()) return;

            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const container = document.getElementById('profile-container');
            
            container.innerHTML = `
                <div class="profile-container">
                    <div class="profile-sidebar">
                        <div class="profile-avatar">👤</div>
                        <h2 id="profile-name">${user.full_name || 'Пользователь'}</h2>
                        <p id="profile-role">${user.role_id === 1 ? 'Заказчик' : 'Исполнитель'}</p>
                        
                        <ul class="profile-menu">
                            <li><a onclick="showSection('overview')" class="active">Обзор</a></li>
                            <li><a onclick="showSection('projects')">Мои проекты</a></li>
                            <li><a onclick="showSection('bids')">Мои отклики</a></li>
                            <li><a onclick="showSection('tasks')">Мои задачи</a></li>
                            <li><a onclick="showSection('settings')">Настройки</a></li>
                        </ul>
                    </div>

                    <div class="profile-content">
                        <div id="section-overview" class="profile-section active">
                            <h2>Добро пожаловать, ${user.full_name || 'Пользователь'}!</h2>
                            <div class="stats-grid" id="stats-grid">
                                <div class="stat-card">
                                    <div class="stat-number" id="stat-projects">0</div>
                                    <div class="stat-label">Проектов</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-number" id="stat-bids">0</div>
                                    <div class="stat-label">Откликов</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-number" id="stat-tasks">0</div>
                                    <div class="stat-label">Задач</div>
                                </div>
                            </div>
                        </div>

                        <div id="section-projects" class="profile-section">
                            <h2>Мои проекты</h2>
                            ${user.role_id === 1 ? '<button class="btn btn-primary" onclick="location.href=\'create-project.html\'">+ Создать проект</button>' : ''}
                            <div class="projects-list" id="my-projects-list">
                                Загрузка проектов...
                            </div>
                        </div>

                        <div id="section-bids" class="profile-section">
                            <h2>Мои отклики</h2>
                            <div class="filter-section">
                                <select class="filter-select" id="bid-filter" onchange="loadBids()">
                                    <option value="all">Все отклики</option>
                                    <option value="pending">Ожидают</option>
                                    <option value="accepted">Принятые</option>
                                    <option value="rejected">Отклоненные</option>
                                </select>
                            </div>
                            <div class="bids-list" id="my-bids-list">
                                Загрузка откликов...
                            </div>
                        </div>

                        <div id="section-tasks" class="profile-section">
                            <h2>Мои задачи</h2>
                            <div class="filter-section">
                                <select class="filter-select" id="task-filter" onchange="loadTasks()">
                                    <option value="all">Все задачи</option>
                                    <option value="todo">К выполнению</option>
                                    <option value="in_progress">В работе</option>
                                    <option value="done">Выполненные</option>
                                </select>
                            </div>
                            <div class="tasks-list" id="my-tasks-list">
                                Загрузка задач...
                            </div>
                        </div>

                        <div id="section-settings" class="profile-section">
                            <h2>Настройки профиля</h2>
                            <form id="profile-settings-form">
                                <div class="form-group">
                                    <label>Полное имя</label>
                                    <input type="text" id="settings-name" class="form-control" value="${user.full_name || ''}">
                                </div>
                                
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" id="settings-email" class="form-control" value="${user.email || ''}">
                                </div>
                                
                                <div class="form-group">
                                    <label>О себе</label>
                                    <textarea id="settings-bio" class="form-control" rows="4"></textarea>
                                </div>
                                
                                <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                            </form>
                        </div>
                    </div>
                </div>
            `;

            // Загружаем все данные
            await Promise.all([
                loadStats(),
                loadUserProjects(),
                loadBids(),
                loadTasks()
            ]);
        }

        // Переключение между разделами
        function showSection(section) {
            document.querySelectorAll('.profile-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`section-${section}`).classList.add('active');
            
            document.querySelectorAll('.profile-menu a').forEach(a => a.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Загрузка статистики
        async function loadStats() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const token = localStorage.getItem('token');
            
            try {
                // Получаем проекты пользователя
                const projectsResult = await api.getUserProjects();
                const projects = projectsResult.status === 'success' ? projectsResult.data : [];
                
                // Получаем отклики
                const bidsResult = await api.getUserBids();
                const bids = bidsResult.status === 'success' ? bidsResult.data : [];
                
                // Получаем задачи
                const tasksResult = await api.getUserTasks();
                const tasks = tasksResult.status === 'success' ? tasksResult.data : [];
                
                document.getElementById('stat-projects').textContent = projects.length;
                document.getElementById('stat-bids').textContent = bids.length;
                document.getElementById('stat-tasks').textContent = tasks.length;
            } catch(error) {
                console.error('Error loading stats:', error);
            }
        }

        // Загрузка проектов пользователя
        async function loadUserProjects() {
            const projectsList = document.getElementById('my-projects-list');
            if(!projectsList) return;
            
            projectsList.innerHTML = 'Загрузка проектов...';
            
            try {
                const result = await api.getUserProjects();
                
                if(result.status === 'success' && result.data.length > 0) {
                    projectsList.innerHTML = result.data.map(project => `
                        <div class="project-card" data-project-id="${project.id}">
                            <div class="project-header">
                                <h3>${project.title}</h3>
                                <span class="project-status-badge ${project.is_deleted == 1 ? 'status-cancelled' : 'status-open'}">
                                    ${project.is_deleted == 1 ? 'Удален' : 'Активен'}
                                </span>
                            </div>
                            <p>${project.description.substring(0, 100)}...</p>
                            <p><strong>Бюджет:</strong> ${project.budget ? project.budget + ' ₽' : 'Не указан'}</p>
                            <div style="display: flex; gap: 10px; margin-top: 15px;">
                                <button class="btn btn-small btn-primary" onclick="viewProject(${project.id})">Просмотр</button>
                                ${project.is_deleted == 1 ? '' : `
                                    <button class="btn btn-small btn-outline" onclick="editProject(${project.id})">✏️ Редактировать</button>
                                    <button class="btn btn-small btn-danger" onclick="deleteProject(${project.id})">🗑️ Удалить</button>
                                `}
                                <button class="btn btn-small btn-info" onclick="viewProjectBids(${project.id})">📋 Отклики (${project.bids_count || 0})</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    projectsList.innerHTML = '<p>У вас пока нет проектов</p>';
                }
            } catch(error) {
                console.error('Error loading projects:', error);
                projectsList.innerHTML = '<p>Ошибка загрузки проектов</p>';
            }
        }

        // Функция для удаления проекта
        window.deleteProject = async (id) => {
            if(confirm('Вы уверены, что хотите удалить этот проект?')) {
                const result = await api.deleteProject(id);
                if(result.status === 'success') {
                    alert('Проект удален');
                    loadUserProjects(); // Перезагружаем список проектов
                    loadStats(); // Обновляем статистику
                } else {
                    alert('Ошибка: ' + (result.message || 'Не удалось удалить проект'));
                }
            }
        };

        // Просмотр откликов на проект
        window.viewProjectBids = (id) => {
            window.location.href = `project.html?id=${id}`;
        };

        // Загрузка откликов
        async function loadBids() {
            const bidsList = document.getElementById('my-bids-list');
            if (!bidsList) return;
            
            bidsList.innerHTML = 'Загрузка откликов...';
            
            try {
                const filter = document.getElementById('bid-filter')?.value || 'all';
                const result = await api.getUserBids(filter);
                
                if(result.status === 'success' && result.data && result.data.length > 0) {
                    bidsList.innerHTML = result.data.map(bid => {
                        // Определяем статус
                        let statusClass = 'status-pending';
                        let statusText = 'Ожидает';
                        
                        if(bid.status_name === 'accepted' || bid.status_id == 2) {
                            statusClass = 'status-accepted';
                            statusText = 'Принят';
                        } else if(bid.status_name === 'rejected' || bid.status_id == 3) {
                            statusClass = 'status-rejected';
                            statusText = 'Отклонен';
                        }
                        
                        // Безопасное отображение данных
                        const projectTitle = bid.project_title || 'Проект';
                        const proposedBudget = bid.proposed_budget ? bid.proposed_budget + ' ₽' : 'Не указано';
                        const coverLetter = bid.cover_letter || '';
                        const createdDate = bid.created_at ? new Date(bid.created_at).toLocaleDateString() : 'Дата неизвестна';
                        
                        return `
                            <div class="bid-card">
                                <div class="project-header">
                                    <h3>${projectTitle}</h3>
                                    <span class="project-status-badge ${statusClass}">${statusText}</span>
                                </div>
                                <p><strong>Ваше предложение:</strong> ${proposedBudget}</p>
                                ${coverLetter ? `<p><strong>Письмо:</strong> ${coverLetter}</p>` : ''}
                                <p><small>Отправлено: ${createdDate}</small></p>
                            </div>
                        `;
                    }).join('');
                } else {
                    bidsList.innerHTML = '<p>У вас пока нет откликов</p>';
                }
            } catch(error) {
                console.error('Ошибка загрузки откликов:', error);
                bidsList.innerHTML = '<p style="color: var(--danger);">Ошибка загрузки откликов</p>';
            }
        }

        // Загрузка задач
        async function loadTasks() {
            try {
                const filter = document.getElementById('task-filter')?.value || 'all';
                const result = await api.getUserTasks(filter);
                const tasksList = document.getElementById('my-tasks-list');
                
                if(result.status === 'success' && result.data.length > 0) {
                    tasksList.innerHTML = result.data.map(task => `
                        <div class="project-card">
                            <div class="project-header">
                                <h3>${task.title}</h3>
                                <span class="project-status status-${task.status}">${task.status_text}</span>
                            </div>
                            <p><strong>Проект:</strong> ${task.project_title}</p>
                            <p>${task.description || ''}</p>
                            <div style="margin-top: 10px;">
                                <button class="btn btn-small btn-outline" onclick="updateTaskStatus(${task.id}, '${task.status}')">Изменить статус</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    tasksList.innerHTML = '<p>У вас пока нет задач</p>';
                }
            } catch(error) {
                console.error('Error loading tasks:', error);
            }
        }

        function getStatusClass(statusId) {
            const map = {1: 'open', 2: 'open', 3: 'progress', 4: 'done'};
            return map[statusId] || 'open';
        }

        function getStatusText(statusId) {
            const map = {1: 'На модерации', 2: 'Открыт', 3: 'В работе', 4: 'Завершен'};
            return map[statusId] || 'Неизвестно';
        }

        function viewProject(id) {
            window.location.href = `project.html?id=${id}`;
        }

        function viewBids(projectId) {
            showSection('bids');
            loadBids(projectId);
        }

        // Инициализация
        loadProfile();
    </script>
</body>
</html>
